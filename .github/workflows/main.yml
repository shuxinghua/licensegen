name: Build Kivy APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer
    steps:
      - uses: actions/checkout@v4

      - name: Build APK
        run: |
          echo "y" | buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: licensegen-app
          path: bin/*.apk
